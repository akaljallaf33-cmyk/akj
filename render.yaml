services:
  - type: web
    name: wi-dash
    env: node
    buildCommand: pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wi-dash-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: GUEST_USERNAME
        value: guest
      - key: GUEST_PASSWORD
        sync: false

databases:
  - name: wi-dash-db
    databaseName: widash
    user: widash
    plan: free
